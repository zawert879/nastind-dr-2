name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  # Разрешить ручной запуск из вкладки Actions
  workflow_dispatch:

# Права для OIDC-деплоя на GitHub Pages (без Personal Access Token)
permissions:
  contents: read
  pages: write
  id-token: write

# Только один деплой одновременно; новый запуск отменяет предыдущий в очереди
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build
        run: npm run build
        env:
          # Если репо деплоится в поддиректорию (не user.github.io),
          # раскомментируй и задай имя репо:
          # BASE_PATH: '/<repo-name>'
          NODE_ENV: production

      - name: Configure Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
